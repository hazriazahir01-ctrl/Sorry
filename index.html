<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discrete Choice Model</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
  <h1>Discrete Choice Model</h1>

  <label>Number of Respondents:</label>
  <input type="number" id="numRespondents" min="1">
  <button onclick="startSurvey()">Start</button>

  <div id="survey"></div>

  <button id="calculateBtn" onclick="calculate()" style="display:none;">
    Calculate Results
  </button>

  <div id="results"></div>

  <canvas id="utilityChart"></canvas>
  <canvas id="probChart"></canvas>
  <canvas id="weightChart"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
